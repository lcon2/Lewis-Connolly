# Site settings
title: Lewis Connolly
email: lewisconnolly88@gmail.com
description: >-
  This is the website of Lewis Connolly. I write about meaning, philosophy,
  spirituality, history, and psychology. I'm particularly interested in belief,
  because people do not act on truths; it's their beliefs that move them.
baseurl: ""  # Leave empty if your site is hosted at the root of your domain
url: "https://lewisconnolly.com"  # Full URL of your site

# Optional: POST endpoint for the article footer email field (e.g. Buttondown embed:
# https://buttondown.email/api/emails/embed-subscribe/your-handle). Leave unset while experimenting; the form will not submit until configured.
# newsletter_form_action: "https://buttondown.email/api/emails/embed-subscribe/your-handle"

# Social media
twitter_username: Adv_with_Lewis
github_username: jekyll

# Permalink settings
permalink: /:year/:month/:day/:title/

# Plugins
plugins:
  - jekyll-sitemap

# Build settings
future: true  # Allow future dated posts

# Build settings
exclude:
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/

# Defaults
defaults:
  - scope:
      path: "studies"
      type: "pages"
    values:
      layout: studies

# Ensure category pages are built
include:
  - categories
  - category-redirects

# Optional: Enable incremental builds for faster local development
incremental: true
