# Welcome to Jekyll!
#
# This config file contains settings that affect your whole site. Modify these
# values as needed to personalize and configure your Jekyll site.

# Site settings
title: Lewis Connolly
email: your-email@example.com
description: >-
  This is the website of Lewis Connolly. I write about meaning, philosophy,
  spirituality, history, and psychology. I’m particularly interested in belief,
  because people do not act on truths; it’s their beliefs that move them.
baseurl: "" # Leave empty if your site is hosted at the root of your domain
url: "" # Base URL, e.g., http://example.com

# Social media
twitter_username: jekyllrb
github_username: jekyll

# Permalink settings
# Customize the URL structure for posts
permalink: /:year/:month/:day/:title/

# Plugins
plugins:
  - jekyll-feed

# Build settings
# Exclude unnecessary files and folders from processing
exclude:
  - .sass-cache/
  - .jekyll-cache/
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/

# Optional: Enable incremental builds for faster local development
incremental: true