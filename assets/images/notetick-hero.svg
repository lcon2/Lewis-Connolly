      <path d="M35 148l7 7 12-14" fill="none" stroke="#ffb564" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" />
      <rect x="66" y="142" width="184" height="10" rx="5" fill="#efe6da" />
      <rect x="66" y="160" width="132" height="8" rx="4" fill="#cbb79f" opacity="0.62" />
