      <path d="M30 95l7 7 13-15" fill="none" stroke="#ffb564" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" />
      <rect x="58" y="88" width="160" height="10" rx="5" fill="#efe6da" opacity="0.92" />
      <rect x="58" y="107" width="110" height="8" rx="4" fill="#cbb79f" opacity="0.62" />
      <rect x="24" y="138" width="20" height="20" rx="5" fill="none" stroke="#c8b08d" stroke-width="3" />
