    <g transform="translate(410 168) rotate(7 132 138)">
      <rect x="0" y="0" width="264" height="276" rx="24" fill="#1b1b1b" stroke="#3a342d" />
      <rect x="20" y="20" width="224" height="32" rx="12" fill="#252525" />
      <circle cx="40" cy="36" r="5" fill="#ff9933" />
      <circle cx="58" cy="36" r="5" fill="#d7b98f" />
      <circle cx="76" cy="36" r="5" fill="#8f8f8f" />
      <rect x="24" y="82" width="160" height="10" rx="5" fill="#efe6da" opacity="0.92" />
      <rect x="24" y="104" width="196" height="8" rx="4" fill="#cbb79f" opacity="0.62" />
      <rect x="24" y="140" width="216" height="92" rx="18" fill="url(#panel)" stroke="#5a4330" />
      <rect x="42" y="162" width="18" height="18" rx="4" fill="#ff9933" opacity="0.18" stroke="#ffb564" stroke-width="2.5" />
