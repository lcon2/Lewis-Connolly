      <rect x="72" y="183" width="86" height="7" rx="3.5" fill="#ccb89f" opacity="0.65" />
      <rect x="42" y="204" width="18" height="18" rx="4" fill="none" stroke="#d8c09a" stroke-width="2.5" />
      <rect x="72" y="209" width="124" height="8" rx="4" fill="#f0e7dc" opacity="0.95" />
