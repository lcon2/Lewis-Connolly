  <text x="690" y="236" fill="#f3ede6" font-family="Georgia, serif" font-size="58">Introducing</text>
  <text x="690" y="314" fill="#ffb564" font-family="Georgia, serif" font-size="88" font-weight="700">NoteTick</text>
  <text x="692" y="370" fill="#d8cec5" font-family="Georgia, serif" font-size="28">Desktop notes without the noise</text>

  <g transform="translate(690 416)">
    <rect x="0" y="0" width="162" height="42" rx="21" fill="#201a15" stroke="#5f452e" />
    <rect x="176" y="0" width="174" height="42" rx="21" fill="#1b1b1b" stroke="#3e3e3e" />
    <rect x="366" y="0" width="136" height="42" rx="21" fill="#201a15" stroke="#5f452e" />
    <text x="26" y="27" fill="#ffbf7a" font-family="Georgia, serif" font-size="22">No accounts</text>
    <text x="206" y="27" fill="#f3ede6" font-family="Georgia, serif" font-size="22">Just notes</text>
    <text x="392" y="27" fill="#ffbf7a" font-family="Georgia, serif" font-size="22">Offline</text>
  </g>
</svg>
