<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Introducing NoteTick</title>
  <desc id="desc">A dark desktop-themed illustration with sticky note windows, checkboxes, and the NoteTick title.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#161616" />
      <stop offset="100%" stop-color="#0d0d0d" />
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2b2118" />
      <stop offset="100%" stop-color="#171717" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="20" flood-color="#000000" flood-opacity="0.35" />
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />
  <circle cx="1010" cy="94" r="220" fill="#ff9933" opacity="0.12" />
  <circle cx="170" cy="540" r="250" fill="#f0e3cf" opacity="0.06" />
  <circle cx="530" cy="200" r="160" fill="#ffffff" opacity="0.04" />

