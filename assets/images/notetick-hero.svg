      <rect x="66" y="272" width="102" height="8" rx="4" fill="#cbb79f" opacity="0.62" />
      <rect x="28" y="312" width="122" height="32" rx="16" fill="#2a2118" stroke="#75563a" />
      <rect x="164" y="312" width="128" height="32" rx="16" fill="#202020" stroke="#4c4c4c" />
      <text x="48" y="334" fill="#ffbf7a" font-family="Georgia, serif" font-size="18">Offline</text>
      <text x="196" y="334" fill="#efe6da" font-family="Georgia, serif" font-size="18">Simple</text>
