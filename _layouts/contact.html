<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }}</title>
    <link rel="stylesheet" href="{{ '/assets/css/styles.css' | relative_url }}">
</head>
<body>
    <header>
        <div class="logo">
            <a href="{{ '/' | relative_url }}">
                <img src="{{ '/assets/images/logo.png' | relative_url }}" alt="Logo" style="display: block; margin: 0 auto; max-width: 80px; height: auto;">
            </a>
        </div>
    </header>
    <main style="max-width: 800px; margin: 20px auto; line-height: 1.8; font-size: 1.1em; color: #f0f0f0;">
        {{ content }}
    </main>
    <footer style="margin-top: 40px; padding: 20px 0; text-align: center; border-top: 1px solid #444; font-size: 0.9em; color: #a0a0a0;">
        <p>&copy; {{ site.title }} {{ site.time | date: '%Y' }}</p>
    </footer>
</body>
</html>
